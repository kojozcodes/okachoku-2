<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 220" fill="none">
<rect width="750" height="220" fill="white"/>
<!-- Seller -->
<g transform="translate(70,30)">
<circle cx="0" cy="30" r="28" fill="#E8E2DA"/>
<circle cx="0" cy="26" r="20" fill="#F5F0EB"/>
<circle cx="-5" cy="22" r="2" fill="#6B4226"/>
<circle cx="5" cy="22" r="2" fill="#6B4226"/>
<path d="M-4 30 Q0 34 4 30" stroke="#6B4226" stroke-width="1.2" fill="none"/>
<rect x="-20" y="58" width="40" height="45" rx="4" fill="#6B4226" opacity=".7"/>
<rect x="-8" y="58" width="16" height="10" rx="2" fill="#D4C9BC"/>
</g>
<text x="70" y="155" text-anchor="middle" font-family="'Noto Sans JP',sans-serif" font-size="13" font-weight="600" fill="#6B4226">売主様</text>

<!-- Arrow: 売却の相談・依頼 -->
<text x="210" y="85" text-anchor="middle" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#555">売却の</text>
<text x="210" y="102" text-anchor="middle" font-family="'Noto Sans JP',sans-serif" font-size="11" fill="#555">相談・依頼</text>
<line x1="130" y1="80" x2="270" y2="80" stroke="#6B4226" stroke-width="1.5" opacity=".3"/>
<polygon points="270,75 285,80 270,85" fill="#6B4226" opacity=".4"/>

<!-- Agent (岡直) -->
<g transform="translate(350,20)">
<circle cx="0" cy="30" r="30" fill="#E8F0E2"/>
<circle cx="0" cy="26" r="22" fill="#F5F0EB"/>
<circle cx="-6" cy="22" r="2" fill="#5A8C3C"/>
<circle cx="6" cy="22" r="2" fill="#5A8C3C"/>
<rect x="-3" y="16" width="12" height="6" rx="2" fill="#5A8C3C" opacity=".3"/>
<path d="M-5 32 Q0 36 5 32" stroke="#5A8C3C" stroke-width="1.2" fill="none"/>
<rect x="-22" y="58" width="44" height="48" rx="4" fill="#5A8C3C" opacity=".7"/>
<rect x="-10" y="58" width="20" height="10" rx="2" fill="#E8F0E2"/>
</g>
<text x="350" y="155" text-anchor="middle" font-family="'Noto Sans JP',sans-serif" font-size="13" font-weight="600" fill="#5A8C3C">不動産会社</text>
<!-- Label above agent -->
<rect x="275" y="0" width="150" height="26" rx="4" fill="#5A8C3C"/>
<text x="350" y="17" text-anchor="middle" font-family="'Noto Sans JP',sans-serif" font-size="11" font-weight="600" fill="white">一般の買主様を探します</text>

<!-- Arrows to buyers -->
<line x1="415" y1="50" x2="530" y2="30" stroke="#999" stroke-width="1.5"/>
<polygon points="530,25 540,30 530,35" fill="#999"/>
<line x1="415" y1="70" x2="530" y2="70" stroke="#999" stroke-width="1.5"/>
<polygon points="530,65 540,70 530,75" fill="#999"/>
<line x1="415" y1="90" x2="530" y2="110" stroke="#999" stroke-width="1.5"/>
<polygon points="530,105 540,110 530,115" fill="#999"/>

<!-- 3 Buyers -->
<g transform="translate(580,5)">
<circle cx="0" cy="20" r="18" fill="#E8E2DA"/>
<circle cx="0" cy="18" r="13" fill="#F5F0EB"/>
<circle cx="-3" cy="15" r="1.5" fill="#6B4226" opacity=".6"/>
<circle cx="3" cy="15" r="1.5" fill="#6B4226" opacity=".6"/>
</g>
<g transform="translate(580,55)">
<circle cx="0" cy="20" r="18" fill="#E8E2DA"/>
<circle cx="0" cy="18" r="13" fill="#F5F0EB"/>
<circle cx="-3" cy="15" r="1.5" fill="#6B4226" opacity=".6"/>
<circle cx="3" cy="15" r="1.5" fill="#6B4226" opacity=".6"/>
</g>
<g transform="translate(580,105)">
<circle cx="0" cy="20" r="18" fill="#E8E2DA"/>
<circle cx="0" cy="18" r="13" fill="#F5F0EB"/>
<circle cx="-3" cy="15" r="1.5" fill="#6B4226" opacity=".6"/>
<circle cx="3" cy="15" r="1.5" fill="#6B4226" opacity=".6"/>
</g>

<!-- Bottom labels -->
<text x="350" y="190" text-anchor="middle" font-family="'Noto Sans JP',sans-serif" font-size="12" font-weight="600" fill="#6B4226">仲介売却</text>
<rect x="160" y="195" width="380" height="2" fill="#6B4226" opacity=".15" rx="1"/>
</svg>
