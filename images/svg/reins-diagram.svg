<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280" fill="none">
<rect width="700" height="280" rx="8" fill="#FAF7F4"/>
<!-- Seller -->
<rect x="20" y="100" width="110" height="70" rx="8" fill="#6B4226" opacity=".9"/>
<text x="75" y="130" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" font-weight="600">売主様</text>
<text x="75" y="148" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white" opacity=".8">元付業者</text>
<!-- Arrow 1 -->
<line x1="130" y1="135" x2="190" y2="135" stroke="#6B4226" stroke-width="2" marker-end="url(#arr)"/>
<text x="160" y="120" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#777">物件登録</text>
<!-- Okachoku -->
<rect x="190" y="90" width="120" height="90" rx="8" fill="#5A8C3C" opacity=".9"/>
<text x="250" y="125" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" font-weight="700">当 社</text>
<text x="250" y="145" text-anchor="middle" font-family="sans-serif" font-size="9" fill="white" opacity=".8">株式会社岡直</text>
<text x="250" y="162" text-anchor="middle" font-family="sans-serif" font-size="9" fill="white" opacity=".8">（仲介）</text>
<!-- Arrow 2 -->
<line x1="310" y1="135" x2="370" y2="135" stroke="#5A8C3C" stroke-width="2" marker-end="url(#arr2)"/>
<text x="340" y="120" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#777">物件登録</text>
<!-- REINS box -->
<rect x="370" y="80" width="130" height="100" rx="8" fill="white" stroke="#DDD" stroke-width="2"/>
<text x="435" y="115" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#6B4226" font-weight="700">REINS</text>
<text x="435" y="135" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#777">レインズ</text>
<text x="435" y="155" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#999">不動産流通</text>
<text x="435" y="167" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#999">標準情報システム</text>
<!-- Arrow 3 - multiple buyers -->
<line x1="500" y1="110" x2="570" y2="80" stroke="#DDD" stroke-width="2" marker-end="url(#arr3)"/>
<line x1="500" y1="135" x2="570" y2="135" stroke="#DDD" stroke-width="2" marker-end="url(#arr3)"/>
<line x1="500" y1="160" x2="570" y2="190" stroke="#DDD" stroke-width="2" marker-end="url(#arr3)"/>
<text x="540" y="58" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#777">物件紹介</text>
<!-- Buyer agents -->
<rect x="570" y="55" width="110" height="40" rx="6" fill="#E8F0E2" stroke="#5A8C3C" stroke-width="1"/>
<text x="625" y="78" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5A8C3C">不動産会社A</text>
<rect x="570" y="115" width="110" height="40" rx="6" fill="#E8F0E2" stroke="#5A8C3C" stroke-width="1"/>
<text x="625" y="138" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5A8C3C">不動産会社B</text>
<rect x="570" y="175" width="110" height="40" rx="6" fill="#E8F0E2" stroke="#5A8C3C" stroke-width="1"/>
<text x="625" y="198" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5A8C3C">不動産会社C</text>
<!-- Description -->
<text x="350" y="250" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">当社が物件をレインズに登録することで、全国の不動産会社が買主様をお探しします。</text>
<defs>
<marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#6B4226"/></marker>
<marker id="arr2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#5A8C3C"/></marker>
<marker id="arr3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#BBB"/></marker>
</defs>
</svg>
